#:schema https://raw.githubusercontent.com/eitsupi/arf/main/artifacts/arf.schema.json
# arf configuration file
#
# Documentation: https://github.com/eitsupi/arf

[startup]
r_source = "auto"
show_banner = true

[startup.mode]
reprex = false
autoformat = false

[editor]
mode = "emacs"
auto_match = false
auto_suggestions = "all"

[editor.key_map]
Alt-Hyphen = " <- "
Alt-p = " |> "
Alt-l = "devtools::load_all(); "
Alt-c = "devtools::check(); "
Alt-b = "devtools::build_readme();"
Alt-t = "devtools::test();"
Alt-d = "devtools::document(); "

[prompt]
format = "{status}R {version}> "
continuation = "+  "
shell_format = "[{shell}] $ "
mode_indicator = "prefix"

[prompt.indicators]
reprex = "[reprex] "
autoformat = "[format] "

[prompt.status]
override_prompt_color = false

[prompt.status.symbol]
success = ""
error = "✗ "

[prompt.vi.symbol]
insert = "[I] "
normal = "[N] "
non_vi = ""

[completion]
enabled = true
timeout_ms = 50
debounce_ms = 100
max_height = 10
auto_paren_limit = 50

[history]
menu_max_height = 15
disabled = false

[mode.reprex]
comment = "#> "

[colors.r]
comment = "DarkGray"
string = "Green"
number = "LightMagenta"
keyword = "LightBlue"
constant = "LightCyan"
operator = "Yellow"
punctuation = "Default"
identifier = "Default"

[colors.meta]
command = "Magenta"

[colors.prompt]
main = "LightGreen"
continuation = "LightGreen"
shell = "LightRed"
indicator = "Yellow"
duration = "Yellow"

[colors.prompt.status]
success = "LightGreen"
error = "LightRed"

[colors.prompt.vi]
insert = "LightGreen"
normal = "LightYellow"
non_vi = "Default"

[experimental.history_forget]
enabled = false
delay = 2
on_exit_only = false

[experimental.prompt_spinner]
frames = ""
color = "Cyan"

[experimental.prompt_duration]
format = "{value} "
threshold_ms = 2000
