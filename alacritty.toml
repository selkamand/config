# Alacritty configuration file

# Set the default shell to Fish and start a tmux session
[shell]
program = "/opt/homebrew/bin/fish"
args = ["-c", "tmux attach-session || tmux new-session -s general fish || fish"]

# Font configuration
[font]
size = 13.00

[font.normal]
family = "MesloLGS NF"
style = "Bold"

